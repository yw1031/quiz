<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예원쌤과 함께하는 점 찍기</title>
<style>
:root{
  --axis:#333333;
  --grid:#d8d8d8;
  --blue:#1976d2;
  --red:#e53935;
  --text:#222;
  --panel:#f7f8fa;
  --border:#dfe3e8;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:#fff;
  color:var(--text);
  font-family:"Pretendard","Noto Sans KR",Arial,sans-serif;
}
.app{
  width:min(1180px,96vw);
  margin:0 auto;
  padding:24px 0 40px;
}
h1{
  margin:0 0 18px;
  text-align:center;
  font-size:clamp(26px,3vw,40px);
}
.question-card{
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px 20px;
  background:#fff;
  box-shadow:0 6px 20px rgba(0,0,0,.05);
}
.question{
  margin:0;
  text-align:center;
  font-size:clamp(20px,2.2vw,30px);
  font-weight:700;
}
.status-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin:14px 0 18px;
}
.status{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  text-align:center;
}
.status-label{font-size:13px;color:#666}
.status-value{margin-top:3px;font-size:22px;font-weight:800}
.main{
  display:grid;
  grid-template-columns:minmax(0,1fr) 300px;
  gap:20px;
  align-items:start;
}
.board-card,.leaderboard{
  border:1px solid var(--border);
  border-radius:16px;
  background:#fff;
  box-shadow:0 6px 20px rgba(0,0,0,.05);
}
.board-card{padding:14px}
.coordinate-wrap{
  width:100%;
  aspect-ratio:1/1;
}
svg{width:100%;height:100%;display:block;background:#fff;touch-action:none}
.grid-line{stroke:var(--grid);stroke-width:1}
.axis{stroke:var(--axis);stroke-width:1.6;stroke-linecap:round}
.tick{stroke:var(--axis);stroke-width:1}
.coordinate-number{font-size:12px;fill:#000}
.x-number{text-anchor:middle}
.y-number{text-anchor:end;dominant-baseline:middle}
.origin-label{
  font-family:"Times New Roman",serif;
  font-size:19px;
  fill:#000;
}
.axis-label{
  font-family:"Times New Roman",serif;
  font-size:25px;
  font-style:italic;
  fill:#000;
}
.point{pointer-events:none}
.feedback{
  min-height:32px;
  margin-top:10px;
  text-align:center;
  font-size:18px;
  font-weight:700;
}
.feedback.correct{color:var(--blue)}
.feedback.wrong{color:var(--red)}
.controls{
  display:flex;
  justify-content:center;
  margin-top:12px;
}
button{
  border:0;
  border-radius:10px;
  padding:12px 18px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}
#restartBtn{
  background:#222;
  color:#fff;
}
#restartBtn:disabled{
  background:#b8bcc2;
  cursor:not-allowed;
}
.leaderboard{padding:18px}
.leaderboard h2{margin:0 0 12px;font-size:22px}
.leaderboard ol{
  margin:0;
  padding-left:24px;
}
.leaderboard li{
  padding:8px 4px;
  border-bottom:1px solid #eee;
}
.leaderboard li:last-child{border-bottom:0}
.empty{color:#777;font-size:14px}
.final-box{
  display:none;
  margin-top:14px;
  padding:16px;
  border-radius:12px;
  background:#eef5ff;
  border:1px solid #cfe0ff;
  text-align:center;
}
.final-box.show{display:block}
.final-score{
  font-size:30px;
  font-weight:900;
  color:var(--blue);
}
@media (max-width:850px){
  .main{grid-template-columns:1fr}
}
@media (max-width:620px){
  .status-grid{grid-template-columns:repeat(2,1fr)}
  .app{width:min(98vw,1180px);padding-top:12px}
}

#startOverlay{
position:fixed;inset:0;background:#fff;display:flex;justify-content:center;align-items:center;
z-index:9999;flex-direction:column}
#startBtn{font-size:28px;padding:18px 36px;border-radius:14px;background:#222;color:#fff}
#countdown{display:none;font-size:110px;font-weight:900}

</style>
</head>
<body>

<div id="startOverlay">
<button id="startBtn">게임 시작하기</button>
<div id="countdown"></div>
</div>

<div class="app">
  <h1>예원쌤과 함께하는 점 찍기</h1>

  <section class="question-card">
    <p id="question" class="question">점 (x, y)를 좌표평면에 찍으세요.</p>

    <div class="status-grid">
      <div class="status">
        <div class="status-label">남은 시간</div>
        <div id="timeValue" class="status-value">10.0초</div>
      </div>
      <div class="status">
        <div class="status-label">현재까지 푼 문제 수</div>
        <div id="solvedValue" class="status-value">0문제</div>
      </div>
      <div class="status">
        <div class="status-label">누적 점수</div>
        <div id="scoreValue" class="status-value">0점</div>
      </div>
      <div class="status">
        <div class="status-label">남은 문제 수</div>
        <div id="remainingValue" class="status-value">10문제</div>
      </div>
    </div>

    <div class="main">
      <div class="board-card">
        <div class="coordinate-wrap">
          <svg id="plane" viewBox="0 0 800 800" aria-label="좌표평면"></svg>
        </div>
        <div id="feedback" class="feedback"></div>
        <div id="finalBox" class="final-box">
          <div>모든 문제를 완료했습니다.</div>
          <div id="finalScore" class="final-score">0점</div>
        </div>
        <div class="controls">
          <button id="restartBtn" disabled>다시 게임하기</button>
        </div>
      </div>

      <aside class="leaderboard">
        <h2>리더보드</h2>
        <ol id="leaderboardList"></ol>
        <div id="emptyLeaderboard" class="empty">아직 기록이 없습니다.</div>
      </aside>
    </div>
  </section>
</div>

<script>
const TOTAL_QUESTIONS = 10;
const TIME_LIMIT_MS = 10000;
const MIN = -10;
const MAX = 10;
const ANSWER_MIN = -9;
const ANSWER_MAX = 9;

const svg = document.getElementById("plane");
const NS = "http://www.w3.org/2000/svg";
const W = 800, H = 800, M = 70;
const U = (W - 2 * M) / (MAX - MIN);
const sx = x => M + (x - MIN) * U;
const sy = y => H - M - (y - MIN) * U;

const questionEl = document.getElementById("question");
const timeValue = document.getElementById("timeValue");
const solvedValue = document.getElementById("solvedValue");
const scoreValue = document.getElementById("scoreValue");
const remainingValue = document.getElementById("remainingValue");
const feedback = document.getElementById("feedback");
const restartBtn = document.getElementById("restartBtn");
const finalBox = document.getElementById("finalBox");
const finalScore = document.getElementById("finalScore");
const leaderboardList = document.getElementById("leaderboardList");
const emptyLeaderboard = document.getElementById("emptyLeaderboard");

let questions = [];
let currentIndex = 0;
let score = 0;
let startTime = 0;
let timerId = null;
let locked = false;

function E(tag, attrs = {}, text = "") {
  const e = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
  if (text !== "") e.textContent = text;
  return e;
}
const fmt = v => v < 0 ? `−${Math.abs(v)}` : String(v);

function drawPlane() {
  svg.innerHTML = "";

  const defs = E("defs");
  const marker = E("marker", {
    id:"openArrow", markerWidth:"10", markerHeight:"10",
    refX:"8", refY:"5", orient:"auto", markerUnits:"strokeWidth"
  });
  marker.appendChild(E("path", {
    d:"M1 1 L8 5 L1 9",
    fill:"none", stroke:"#333333", "stroke-width":"1.5",
    "stroke-linecap":"round", "stroke-linejoin":"round"
  }));
  defs.appendChild(marker);
  svg.appendChild(defs);

  for (let i = MIN; i <= MAX; i++) {
    svg.appendChild(E("line", {x1:sx(i), y1:sy(MAX), x2:sx(i), y2:sy(MIN), class:"grid-line"}));
    svg.appendChild(E("line", {x1:sx(MIN), y1:sy(i), x2:sx(MAX), y2:sy(i), class:"grid-line"}));
  }

  const ox = sx(0), oy = sy(0);
  svg.appendChild(E("line", {
    x1:sx(MIN), y1:oy, x2:sx(MAX)+18, y2:oy,
    class:"axis", "marker-end":"url(#openArrow)"
  }));
  svg.appendChild(E("line", {
    x1:ox, y1:sy(MIN), x2:ox, y2:sy(MAX)-18,
    class:"axis", "marker-end":"url(#openArrow)"
  }));

  for (let i = MIN; i <= MAX; i++) {
    const x = sx(i), y = sy(i);
    svg.appendChild(E("line", {x1:x, y1:oy-5, x2:x, y2:oy+5, class:"tick"}));
    svg.appendChild(E("line", {x1:ox-5, y1:y, x2:ox+5, y2:y, class:"tick"}));

    if (i !== 0) {
      svg.appendChild(E("text", {x, y:oy+25, class:"coordinate-number x-number"}, fmt(i)));
      svg.appendChild(E("text", {x:ox-13, y, class:"coordinate-number y-number"}, fmt(i)));
    }
  }

  svg.appendChild(E("text", {x:ox-20, y:oy+23, class:"origin-label"}, "O"));
  svg.appendChild(E("text", {x:sx(MAX)+20, y:oy+18, class:"axis-label"}, "x"));
  svg.appendChild(E("text", {x:ox-18, y:sy(MAX)-12, class:"axis-label"}, "y"));
}

function generateQuestions() {
  const result = [];
  const used = new Set();
  while (result.length < TOTAL_QUESTIONS) {
    const x = Math.floor(Math.random() * (ANSWER_MAX - ANSWER_MIN + 1)) + ANSWER_MIN;
    const y = Math.floor(Math.random() * (ANSWER_MAX - ANSWER_MIN + 1)) + ANSWER_MIN;
    const key = `${x},${y}`;
    if (!used.has(key)) {
      used.add(key);
      result.push({x,y});
    }
  }
  return result;
}

function updateStatus(timeLeftMs = TIME_LIMIT_MS) {
  timeValue.textContent = `${Math.max(0, timeLeftMs / 1000).toFixed(1)}초`;
  solvedValue.textContent = `${currentIndex}문제`;
  scoreValue.textContent = `${score}점`;
  remainingValue.textContent = `${TOTAL_QUESTIONS - currentIndex}문제`;
}

function clearPoints() {
  svg.querySelectorAll(".point").forEach(p => p.remove());
}

function drawPoint(x, y, color, radius = 8) {
  const c = E("circle", {
    cx:sx(x), cy:sy(y), r:radius,
    fill:color, class:"point"
  });
  svg.appendChild(c);
}

function startQuestion() {
  if (currentIndex >= TOTAL_QUESTIONS) return finishGame();

  locked = false;
  clearPoints();
  feedback.textContent = "";
  feedback.className = "feedback";

  const q = questions[currentIndex];
  questionEl.textContent = `점 (${fmt(q.x)}, ${fmt(q.y)})를 좌표평면에 찍으세요.`;

  startTime = performance.now();
  updateStatus(TIME_LIMIT_MS);

  cancelAnimationFrame(timerId);
  const tick = now => {
    if (locked) return;
    const remaining = TIME_LIMIT_MS - (now - startTime);
    updateStatus(remaining);

    if (remaining <= 0) {
      handleTimeout();
      return;
    }
    timerId = requestAnimationFrame(tick);
  };
  timerId = requestAnimationFrame(tick);
}

function handleTimeout() {
  if (locked) return;
  locked = true;
  cancelAnimationFrame(timerId);

  const q = questions[currentIndex];
  feedback.textContent = "시간이 끝났습니다. 정답 위치를 확인하세요.";
  feedback.className = "feedback wrong";
  drawPoint(q.x, q.y, "#1976d2");

  setTimeout(() => {
    currentIndex++;
    updateStatus(0);
    startQuestion();
  }, 2000);
}

function eventToCoordinate(evt) {
  const rect = svg.getBoundingClientRect();
  const px = (evt.clientX - rect.left) * (W / rect.width);
  const py = (evt.clientY - rect.top) * (H / rect.height);

  const x = Math.round(MIN + (px - M) / U);
  const y = Math.round(MIN + (H - M - py) / U);

  if (x < MIN || x > MAX || y < MIN || y > MAX) return null;
  return {x,y};
}

svg.addEventListener("pointerdown", evt => {
  if (locked || currentIndex >= TOTAL_QUESTIONS) return;

  const chosen = eventToCoordinate(evt);
  if (!chosen) return;

  locked = true;
  cancelAnimationFrame(timerId);

  const q = questions[currentIndex];
  const remaining = Math.max(0, TIME_LIMIT_MS - (performance.now() - startTime));
  const isCorrect = chosen.x === q.x && chosen.y === q.y;

  if (isCorrect) {
    const gained = Math.floor(remaining / 100);
    score += gained;
    drawPoint(chosen.x, chosen.y, "#1976d2");
    feedback.textContent = `정답입니다! ${gained}점을 얻었습니다.`;
    feedback.className = "feedback correct";

    setTimeout(() => {
      currentIndex++;
      updateStatus(remaining);
      startQuestion();
    }, 700);
  } else {
    drawPoint(chosen.x, chosen.y, "#e53935");
    drawPoint(q.x, q.y, "#1976d2");
    feedback.textContent = `오답입니다. 정답은 (${fmt(q.x)}, ${fmt(q.y)})입니다.`;
    feedback.className = "feedback wrong";

    setTimeout(() => {
      currentIndex++;
      updateStatus(remaining);
      startQuestion();
    }, 2000);
  }
});

function finishGame() {
  locked = true;
  cancelAnimationFrame(timerId);
  clearPoints();

  questionEl.textContent = "형성평가가 끝났습니다.";
  timeValue.textContent = "0.0초";
  solvedValue.textContent = `${TOTAL_QUESTIONS}문제`;
  remainingValue.textContent = "0문제";
  scoreValue.textContent = `${score}점`;
  feedback.textContent = "";
  finalScore.textContent = `${score}점`;
  finalBox.classList.add("show");
  restartBtn.disabled = false;

  saveScore(score);
  renderLeaderboard();
}

function saveScore(value) {
  const key = "yewon-point-plot-leaderboard";
  const records = JSON.parse(localStorage.getItem(key) || "[]");
  records.push({
    score:value,
    date:new Date().toLocaleString("ko-KR")
  });
  records.sort((a,b) => b.score - a.score);
  localStorage.setItem(key, JSON.stringify(records.slice(0,10)));
}

function renderLeaderboard() {
  const key = "yewon-point-plot-leaderboard";
  const records = JSON.parse(localStorage.getItem(key) || "[]");
  leaderboardList.innerHTML = "";

  emptyLeaderboard.style.display = records.length ? "none" : "block";

  records.forEach(record => {
    const li = document.createElement("li");
    li.innerHTML = `<strong>${record.score}점</strong><br><small>${record.date}</small>`;
    leaderboardList.appendChild(li);
  });
}

function startGame() {
  questions = generateQuestions();
  currentIndex = 0;
  score = 0;
  locked = false;
  restartBtn.disabled = true;
  finalBox.classList.remove("show");
  drawPlane();
  updateStatus();
  startQuestion();
}

restartBtn.addEventListener("click", startGame);

const overlay=document.getElementById("startOverlay");
const startBtn=document.getElementById("startBtn");
const countdown=document.getElementById("countdown");

async function showStartScreen(){
  overlay.style.display="flex";
  startBtn.style.display="inline-block";
  countdown.style.display="none";
}

async function beginSequence(){
  startBtn.style.display="none";
  countdown.style.display="block";
  for(const n of [3,2,1]){
    countdown.textContent=n;
    await new Promise(r=>setTimeout(r,500));
  }
  overlay.style.display="none";
  startGame();
}

startBtn.addEventListener("click",beginSequence);

const oldRestart=restartBtn.onclick;
restartBtn.addEventListener("click",(e)=>{
  e.stopImmediatePropagation();
  restartBtn.disabled=true;
  finalBox.classList.remove("show");
  showStartScreen();
},true);

showStartScreen();


drawPlane();
renderLeaderboard();
</script>
</body>
</html>
